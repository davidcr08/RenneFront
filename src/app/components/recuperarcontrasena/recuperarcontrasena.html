<div class="login-container">
  <div class="login-card">

    <h2>Recuperar contraseña</h2>
    <p class="subtitle">Sigue los pasos para recuperar tu acceso</p>

    <!-- PASO 1 -->
    @if (step === 1) {
      <div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" [(ngModel)]="email" placeholder="Ingresa tu correo">
        </div>

        <button class="login-button" (click)="enviarCodigo()">
          Enviar código
        </button>
      </div>
    }

    <!-- PASO 2 -->
    @if (step === 2) {
      <div>
        <div class="form-group">
          <label>Código de verificación</label>
          <input type="text" [(ngModel)]="codigo" placeholder="Ej: 123456">
        </div>

        <button class="login-button" (click)="verificarCodigo()">
          Verificar código
        </button>
      </div>
    }

    <!-- PASO 3 -->
    @if (step === 3) {
      <div>
        <div class="form-group">
          <label>Nueva contraseña</label>
          <input type="password" [(ngModel)]="nuevaPassword">
        </div>

        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" [(ngModel)]="confirmPassword">
        </div>

        <button class="login-button" (click)="resetearPassword()">
          Cambiar contraseña
        </button>
      </div>
    }

    <!-- MENSAJE -->
    @if (mensaje) {
      <p class="error-message">
        {{ mensaje }}
      </p>
    }

  </div>
</div>
