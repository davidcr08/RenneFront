<div class="card">

  <h3>{{producto.nombre}}</h3>

  <p class="descripcion">
    {{producto.descripcion}}
  </p>

  <p class="precio">
    $ {{producto.precio}}
  </p>

  <button
    class="btn-comprar"
    (click)="agregarAlCarrito()">

    Agregar al carrito

  </button>

  <button
    class="btn-comprar"
    [routerLink]="['/producto', producto.id]">

    Comprar

  </button>

</div>
