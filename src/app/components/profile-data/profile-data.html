<div class="profile-container" *ngIf="!loading && perfil">

  <h2>Perfil de Usuario</h2>

  <div class="profile-card">

    <p><strong>Correo:</strong> {{perfil.correo}}</p>

    <p><strong>Tipo de usuario:</strong> {{perfil.tipoUsuario}}</p>

    <div *ngIf="perfil.nombre">
      <strong>Nombre:</strong>

      <span *ngIf="!editMode">{{perfil.nombre}}</span>

      <input *ngIf="editMode"
             [(ngModel)]="perfil.nombre">
    </div>

    <div *ngIf="perfil.ciudad">
      <strong>Ciudad:</strong>

      <span *ngIf="!editMode">{{perfil.ciudad}}</span>

      <input *ngIf="editMode"
             [(ngModel)]="perfil.ciudad">
    </div>

    <div *ngIf="perfil.departamento">
      <strong>Departamento:</strong>

      <span *ngIf="!editMode">{{perfil.departamento}}</span>

      <input *ngIf="editMode"
             [(ngModel)]="perfil.departamento">
    </div>

    <div *ngIf="perfil.telefono">
      <strong>Teléfono:</strong>

      <span *ngIf="!editMode">{{perfil.telefono}}</span>

      <input *ngIf="editMode"
             [(ngModel)]="perfil.telefono">
    </div>

    <div *ngIf="perfil.direccion">
      <strong>Dirección:</strong>

      <span *ngIf="!editMode">{{perfil.direccion}}</span>

      <input *ngIf="editMode"
             [(ngModel)]="perfil.direccion">
    </div>

    <br>

    <button *ngIf="!editMode" (click)="activarEdicion()">
      Editar perfil
    </button>

    <button *ngIf="editMode" (click)="guardarCambios()">
      Guardar cambios
    </button>

  </div>

</div>

<div *ngIf="loading">
  Cargando perfil...
</div>
